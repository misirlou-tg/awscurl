name: Build and Push image for Ubuntu 24.04

#
# Note: This workflow requires that the Docker Hub username & a personal
# access token (PAT) are configured in GitHub for the repository:
# - Repostory var: DOCKERHUB_USERNAME
# - Repostiory secret: DOCKERHUB_TOKEN
#
# This uses actions from https://github.com/lukka that I found
# researching how to build vcpkg. Currently we are building the
# executable on the GitHub action runner then the Dockerfile
# copies that to the image.
#
# Here are docs on how to use Docker's GitHub actions, currently
# we are only using the login-action:
# https://docs.docker.com/build/ci/github-actions/
#
# Also some information in Docker's GitHub repo:
# https://github.com/docker/login-action
# https://github.com/docker/build-push-action
#

on:
  # Runs on pushes targeting master
  push:
    branches:
      - master
  # Pull requests
  pull_request:
  # Allows the ability to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    name: 🔨 Build and Push to Docker Hub

    env:
      # This is the repo the image will be pushed to
      DOCKER_REPO: ${{ vars.DOCKERHUB_USERNAME }}/awscurl
      # IMAGE_NAME_LATEST and IMAGE_NAME_COMMIT_HASH will also be added
      # to env by appending tags to DOCKER_REPO

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v6
      - name: 📝 Log info about this runner
        run: uname -a

      - name: 📝 Starting step summary
        run: echo '## Build and Push summary' >> "$GITHUB_STEP_SUMMARY"

      - name: ⚙️ Set push operation (steps.set-push.outputs.doPush)
        id: set-push
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            echo "PR workflow, only building image"
            echo "doPush=false" >> "$GITHUB_OUTPUT"
          else
            echo "Other workflow, build and push image"
            echo "doPush=true" >> "$GITHUB_OUTPUT"
          fi

      - name: ⚙️ Add IMAGE_NAMEs to env
        # Two tags "latest" and "noble-commitHash" will be added to DOCKER_REPO
        # https://dev.to/hectorleiva/github-actions-and-creating-a-short-sha-hash-8b7
        run: |
          echo "IMAGE_NAME_LATEST=${DOCKER_REPO}:latest" >> "$GITHUB_ENV"
          short_hash=$(git rev-parse --short ${{ github.sha }})
          echo "IMAGE_NAME_COMMIT_HASH=${DOCKER_REPO}:noble-${short_hash}" >> "$GITHUB_ENV"

      - name: 📝 Adding step summary
        run: |
          # The step summary supports markdown
          echo "Building image with tag: \`${IMAGE_NAME_COMMIT_HASH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Performing push: \`${{ steps.set-push.outputs.doPush }}\`" >> "$GITHUB_STEP_SUMMARY"

      # Workaround issue where caching of vcpkg packages does not work
      # (also added VCPKG_BINARY_SOURCES below)
      # https://github.com/lukka/run-cmake/issues/152#issuecomment-2995699875
      # https://github.com/lukka/run-vcpkg/issues/243
      - name: 🔧 Setup vcpkg cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-ubuntu-noble-${{ hashFiles('vcpkg.json', 'vcpkg_overlay/**', 'CMakeLists.txt', 'CMakePresets.json') }}

      # These steps come from https://github.com/marketplace/actions/run-vcpkg
      - name: 🔧 Install CMake
        uses: lukka/get-cmake@latest
      - name: 🔧 Install and configure vcpkg
        uses: lukka/run-vcpkg@08ab0cc59d3f33647c5dc2b1e8f2093266c7b873
      - name: 🔨 Run CMake, compile awscurl
        uses: lukka/run-cmake@v10.9
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_cache,readwrite
        with:
          # run-cmake seems to require presets, these can be found in CMakePresets.json
          configurePreset: ci
          buildPreset: ci
          buildPresetAdditionalArgs: "['--config Release']"

      # Login to Docker Hub
      - name: 🔑 Login to Docker Hub
        if: steps.set-push.outputs.doPush == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Build the image
      - name: 📦 Build docker image
        run: |
          docker build \
            --tag ${IMAGE_NAME_LATEST} \
            --tag ${IMAGE_NAME_COMMIT_HASH} \
            .
      # Push the image tagged with the commit hash
      - name: 🐳 Push to Docker Hub
        if: steps.set-push.outputs.doPush == 'true'
        run: docker push ${IMAGE_NAME_COMMIT_HASH}
      # Push "latest" tag
      - name: 🐳 Push latest image tag to Docker Hub
        if: ${{ steps.set-push.outputs.doPush == 'true' && github.ref == 'refs/heads/master' }}
        run: docker push ${IMAGE_NAME_LATEST}

      - name: 📤 Archive build artifact
        uses: actions/upload-artifact@v7
        with:
          name: awscurl-ubuntu-noble
          path: build/awscurl
